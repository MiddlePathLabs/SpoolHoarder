          "name": "Does it work without a cloud account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The core app is local-first with a SQLite database on your device. You can track inventory, manage projects, and back up your data without creating an account. Cloud sync is an optional Pro feature."

        {
          "@type": "Question",
          "name": "Can I scan spools with my phone by the printer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. On iPhone and iPad, Spool Hoarder supports camera-based AI scanning, Apple Vision OCR, NFC tag reading, UPC barcodes, and batch scanning for multiple spools at once."
          }
        },
        {
          "@type": "Question",
          "name": "How does AI scanning work? Is it private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can bring your own API key (Gemini, Claude, or OpenAI) or use the included credits with a Pro subscription. Photos are compressed to 1024px and EXIF metadata is stripped before processing. API keys are stored in your platform's secure keychain."
          }
        },
        {
          "@type": "Question",
          "name": "I track spools in a spreadsheet. Can I import them?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Import your existing CSV and start without re-entering your inventory. Spool Hoarder also auto-detects SpoolStock exports and normalizes data against the SpoolmanDB catalog during import."
          }
        },
        {
          "@type": "Question",
          "name": "Can I move my data to another computer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Export a full data bundle (ZIP with SHA-256 checksums) or a CSV at any time. The app also runs rolling auto-backups. No vendor lock-in."
          }
        },
        {
          "@type": "Question",
          "name": "Does it integrate with Spoolman or other tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Spool Hoarder uses SpoolmanDB for catalog autocomplete and supports SpoolmanDB-compatible fields. It also reads OpenSpool, Spoolman, and OpenTag3D QR codes and NFC tags."
          }
        },

          "@type": "Question",
          "name": "What's free vs paid?",

            "@type": "Answer",
